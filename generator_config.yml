provider:
  name: qumulo
resources:
  files_quotas:
    create:
      method: POST
      path: /v1/files/quotas/
    read:
      method: GET
      path: /v1/files/quotas/{id}
    update:
      method: PUT
      path: /v1/files/quotas/{id}
    delete:
      method: DELETE
      path: /v1/files/quotas/{id}
data_sources:
  files_quotas:
    read:
      path: /v1/files/quotas/
      method: GET
